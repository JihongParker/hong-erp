name: Refresh backtest

on:
  schedule:
    # 3rd of each month, 07:00 UTC — after FRED posts the prior month's data
    - cron: '0 7 3 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy
      - name: Regenerate backtest from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh-backtest.py
      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet src/data/backtest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "backtest-bot"
            git config user.email "actions@github.com"
            git add src/data/backtest.json
            git commit -m "backtest: monthly FRED refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # Pushes made with GITHUB_TOKEN do not trigger other workflows,
      # so kick the Pages deploy explicitly.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml -R ${{ github.repository }}
